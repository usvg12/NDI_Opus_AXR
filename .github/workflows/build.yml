name: Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate project structure
        run: |
          echo "=== Checking required files ==="
          for f in \
            ProjectSettings/ProjectVersion.txt \
            ProjectSettings/EditorBuildSettings.asset \
            Assets/Scenes/Boot.unity \
            Assets/Plugins/Android/AndroidManifest.xml \
            Assets/Plugins/Android/mainTemplate.gradle \
            Assets/Scripts/AppController.cs \
            Assets/Scripts/NDIReceiver.cs \
            Assets/Scripts/SceneBootstrapper.cs \
            Assets/Editor/BuildHelper.cs \
            Packages/manifest.json; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "  OK: $f"
          done

      - name: Validate version.txt
        run: |
          VERSION_FILE="Assets/Editor/version.txt"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "WARNING: $VERSION_FILE not found (defaults to 1.0.0)"
            exit 0
          fi
          VERSION=$(head -1 "$VERSION_FILE" | tr -d '[:space:]')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format '$VERSION' (expected X.Y.Z)"
            exit 1
          fi
          echo "Version: $VERSION"

      - name: Check for NDI library placeholder
        run: |
          NDI_LIB="Assets/Plugins/NDI/Android/arm64-v8a/libndi.so"
          if [ ! -f "$NDI_LIB" ]; then
            echo "INFO: NDI native library not present (app will use test-pattern fallback)"
          else
            echo "NDI library found: $(wc -c < "$NDI_LIB") bytes"
          fi

      - name: Validate ProjectVersion.txt
        run: |
          VERSION=$(head -1 ProjectSettings/ProjectVersion.txt | sed 's/m_EditorVersion: //')
          echo "Unity version: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not read Unity version from ProjectVersion.txt"
            exit 1
          fi

  build:
    name: Unity Build
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ secrets.UNITY_LICENSE != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          buildMethod: NDIViewer.Editor.BuildHelper.BuildReleaseAPK
          unityVersion: auto
          versioning: Custom
          version: none

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: NDI_XR_Viewer_APK
          path: Builds/*.apk
          retention-days: 14

  test:
    name: Edit Mode Tests
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ secrets.UNITY_LICENSE != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: auto
          testMode: EditMode
          artifactsPath: TestResults

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestResults
          path: TestResults
          retention-days: 7
